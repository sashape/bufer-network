name: release

# При пуше тега v* собираем exe и создаём GitHub Release с ним
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Сборка exe
        run: cargo build --release

      - name: Переименование
        run: Copy-Item target/release/bufernet.exe BuferNet.exe

      - name: Релиз с exe
        run: gh release create ${{ github.ref_name }} BuferNet.exe --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
